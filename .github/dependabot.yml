version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
    groups:
      expo:
        patterns:
          - "expo*"
          - "@expo/*"
      react-navigation:
        patterns:
          - "@react-navigation/*"
      react-native:
        patterns:
          - "react-native*"
          - "@react-native*"
